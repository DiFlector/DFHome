services:
  backend:
    build: ./backend
    env_file:
      - .env
    volumes:
      - dfhome-data:/data
    expose:
      - "8000"
    # No IPv6 inside the container: TrueNAS SCALE gives docker networks ULA
    # IPv6 addresses without a working outbound route, so any host with an
    # AAAA record (open-meteo) hangs until timeout instead of using IPv4.
    sysctls:
      net.ipv6.conf.all.disable_ipv6: "1"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "1285:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  dfhome-data:

networks:
  # Smaller MTU than the 1500 default: on TrueNAS SCALE bridges a full-size
  # TLS ServerHello can silently vanish (PMTU blackhole) — the connection
  # opens but the response never arrives, which looks like a read timeout.
  default:
    driver_opts:
      com.docker.network.driver.mtu: "1400"
