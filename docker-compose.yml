services:
  backend:
    build: ./backend
    env_file:
      - .env
    volumes:
      - dfhome-data:/data
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "1285:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  dfhome-data:
