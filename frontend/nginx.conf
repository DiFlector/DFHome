server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
        # Resolve "backend" per-request via Docker's embedded DNS instead of
        # a static upstream group: with the group, one slow request marked
        # the backend "down" and every API call 502'd for a while
        # ("no live upstreams"). ipv6=off keeps nginx off the AAAA record —
        # uvicorn listens on IPv4 only, so IPv6 connects are always refused.
        resolver 127.0.0.11 ipv6=off valid=30s;
        set $backend_upstream http://backend:8000;
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass $backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
    }

    location / {
        try_files $uri /index.html;
    }
}
